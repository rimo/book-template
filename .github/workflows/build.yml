name: Build and Deploy Book

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手動実行を許可

# GitHub Pages へのデプロイに必要な権限(最小権限の原則)
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数のデプロイが走らないようにする
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  # 使用する mdBook のバージョンを固定(再現性のため)
  MDBOOK_VERSION: "0.5.3"

jobs:
  # ── mdBook(Web版)のビルド ──────────────────────────────
  build-mdbook:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install mdBook
      # プリビルドバイナリを取得(cargo install より高速・Rust ツールチェーン不要)
      uses: taiki-e/install-action@v2
      with:
        tool: mdbook@${{ env.MDBOOK_VERSION }}

    - name: Sync Obsidian to mdBook
      run: bash scripts/sync-to-mdbook.sh

    - name: Build mdBook
      run: mdbook build

    - name: Setup Pages
      if: github.ref == 'refs/heads/main'
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist/html

  # ── GitHub Pages へのデプロイ ───────────────────────────
  deploy-pages:
    needs: build-mdbook
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # ── Kindle本(EPUB)のビルド ────────────────────────────
  build-kindle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # タグ push 時に Release を作成するために必要
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Build EPUB
      run: bash scripts/build-kindle.sh

    - name: Upload EPUB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kindle-book
        path: dist/book.epub
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/book.epub
