[book]
title = "あなたの本のタイトル"
authors = ["著者名"]
language = "ja"
src = "src"

[build]
build-dir = "dist/html"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/your-username/your-book"
edit-url-template = "https://github.com/your-username/your-book/edit/main/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
